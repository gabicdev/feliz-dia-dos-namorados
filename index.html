<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todas As Razões Que Me Fazem Amar Você ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fundo estrelado -->
  <div class="stars"></div>
  <div class="moon"></div>

  <!-- Conteúdo principal -->
  <div class="left-side">

  <h1>Todas As Razões Que Me Fazem Amar Você ❤️</h1>

  <p class="intro">
    Talvez eu nunca consiga colocar em palavras tudo o que sinto por você.

    <br><br>

    Mas esta é uma pequena tentativa de reunir algumas das inúmeras razões que me fazem amar você todos os dias. ✨
  </p>

  <button id="open-letter">
    Abrir Carta 💌
  </button>

</div>

  <!-- Carta -->
  <div id="letter-container" class="hidden">
    <div class="letter">

      <p id="reason-text"></p>

      <button id="next-reason">
        Próximo ❤️
      </button>

    </div>
  </div>

  <!-- Música -->
  <audio id="bg-music" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <!-- Controle de volume -->
  <div class="music-controls">
    🔊
    <input
      type="range"
      id="volume-control"
      min="0"
      max="1"
      step="0.01"
      value="0.5"
    >
  </div>

  <script src="script.js"></script>

</body>
</html>
